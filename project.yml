name: 知乎日报-SwiftUI
options:
  bundleIdPrefix: com.codex
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  DailyReader:
    type: application
    platform: iOS
    sources:
      - path: DailyReader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.DailyReader
        INFOPLIST_FILE: DailyReader/Resources/Info.plist
    info:
      path: DailyReader/Resources/Info.plist
      properties:
        CFBundleDisplayName: 日报阅读器
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
  DailyReaderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DailyReaderTests
    dependencies:
      - target: DailyReader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.DailyReaderTests
        GENERATE_INFOPLIST_FILE: YES
  DailyReaderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DailyReaderUITests
    dependencies:
      - target: DailyReader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.DailyReaderUITests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  DailyReader:
    build:
      targets:
        DailyReader: all
    test:
      gatherCoverageData: true
      targets:
        - DailyReaderTests
        - DailyReaderUITests
    run:
      config: Debug
